  .authentication-form{
  width: 382px;
  margin: 0 auto;
  background: #fff;

  border: 2px solid #fff;
  border-radius: 20px/50px;
  background-clip: padding-box;

/* CSS */
.block {
  align-items: center;
  background-color: #e20000;
  border: 2px solid #111;
  border-radius: 8px;
  box-sizing: border-box;
  color: #fff;
  cursor: pointer;
  display: flex;
  font-family: Inter,sans-serif;
  font-size: 16px;
  height: 48px;
  justify-content: center;
  line-height: 24px;
  width: 100%;
  padding: 0 25px;
  position: relative;
  text-align: center;
  text-decoration: none;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

.block:after {
  background-image: linear-gradient(135deg, #f34079 40%, #006675);
  border-radius: 8px;
  content: "";
  display: block;
  height: 48px;
  left: 0;
  width: 100%;
  position: absolute;
  top: -2px;
  transform: translate(8px, 8px);
  transition: transform .2s ease-out;
  z-index: -1;
}

.block:hover:after {
  transform: translate(0, 0);
}

.block:active {
  background-color: rgb(0, 102, 117);
  outline: 0;
}

.block:hover {
  outline: 0;
}

@media (min-width: 768px) {
  .block {
    padding: 0 40px;
  }
}

        <script type="text/javascript">
        $(document).ready(function () {
  $('#id_password').on('focus', function() {
    $('#pinpad').show();
});
$('#pinpad').hide();
  const input_value = $("#id_password"); 

  //disable input from typing

  $("#id_password").keypress(function () {

    return false;
  });

  //add password
  $(".calc").click(function () {

    let value = $(this).val();

    field(value);

  });

 

  function field(value) {

    input_value.val(input_value.val() + value);

  }
 
  $("#clear").click(function () {

    input_value.val("");
  });   

});
    const togglePassword = document.querySelector('#togglePassword');
  const password = document.querySelector('#id_password');
 
  togglePassword.addEventListener('click', function (e) {
    // toggle the type attribute
    const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
    password.setAttribute('type', type);
    // toggle the eye slash icon
    this.classList.toggle('flaticon-invisible pass-close');
});
    </script>
